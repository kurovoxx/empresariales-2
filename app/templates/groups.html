{% extends 'base.html' %}

{% block content %}
    <h2>Gestión de Grupos y Correos</h2>
    
    <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h3>Crear Nuevo Grupo</h3>
        <form action="/groups/create" method="POST">
            <input type="text" name="group_name" placeholder="Nombre del Grupo (ej: Gerencia)" required style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <button type="submit" style="background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px;">Crear Grupo</button>
        </form>
    </div>

    <div style="border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
        <h3>Añadir Email a Grupo</h3>
        <form action="/groups/add_email" method="POST">
            <select name="group_id" style="width: 100%; padding: 8px; margin-bottom: 10px;">
                {% if groups %}
                    {% for group in groups %}
                        <option value="{{ group.id }}">{{ group.name }}</option>
                    {% endfor %}
                {% else %}
                    <option disabled>No hay grupos disponibles</option>
                {% endif %}
            </select>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required style="width: 100%; padding: 8px; margin-bottom: 10px;">
            <button type="submit" style="background: #17a2b8; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px;">Añadir Email</button>
        </form>
    </div>
{% endblock %}
