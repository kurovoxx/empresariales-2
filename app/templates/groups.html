{% extends 'base.html' %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/groups.css') }}">
{% endblock %}

{% block content %}
    <h2>Gestión de Grupos y Correos</h2>
    
    <div class="form-section">
        <h3>Crear Nuevo Grupo</h3>
        <form action="/groups/create" method="POST">
            <input type="text" name="group_name" placeholder="Nombre del Grupo (ej: Gerencia)" required class="form-input">
            <button type="submit" class="btn-primary">Crear Grupo</button>
        </form>
    </div>

    <div class="form-section">
        <h3>Añadir Email a Grupo</h3>
        <form action="/groups/add_email" method="POST">
            <select name="group_id" class="form-input">
                {% if groups %}
                    {% for group in groups %}
                        <option value="{{ group.id }}">{{ group.name }}</option>
                    {% endfor %}
                {% else %}
                    <option disabled>No hay grupos disponibles</option>
                {% endif %}
            </select>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required class="form-input">
            <button type="submit" class="btn-info">Añadir Email</button>
        </form>
    </div>
{% endblock %}
