{% extends 'base.html' %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block content %}
<section class="container-boxed reveal">
    <div class="section-title">
        <h2><i class="fas fa-clock"></i> Programar Envío de Reporte</h2>
        <p>Configura una fecha y hora futura para automatizar el envío de tus documentos.</p>
    </div>

    <form action="/schedule/process" method="POST" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="form-group">
                <label><i class="fas fa-calendar-alt"></i> Fecha y Hora de Envío</label>
                <input type="datetime-local" name="schedule_time" required class="form-control">
            </div>

            <div class="form-group">
                <label><i class="fas fa-users"></i> Grupo de Destinatarios</label>
                {% if not groups %}
                    <p class="text-danger">Por favor cree un grupo en la pestaña "Grupos"</p>
                {% else %}
                    <select name="group_id" class="form-control">
                        {% for group in groups %}
                            <option value="{{ group.id }}">{{ group.name }}</option>
                        {% endfor %}
                    </select>
                {% endif %}
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-building"></i> Departamento</label>
            <select name="department" id="department-select" class="form-control">
                <option value="cyber">Ciberseguridad</option>
                <option value="hr">Recursos Humanos</option>
                <option value="data">Análisis de Datos</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-upload"></i> Seleccionar Archivo Excel (.xlsx)</label>
            <div class="file-input-wrapper">
                <input type="file" name="excel_file" id="excel_file_schedule" accept=".xlsx" required>
                <label for="excel_file_schedule" class="file-label">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Arrastra o haz clic para subir</span>
                </label>
            </div>
            <div id="validation-feedback" style="margin-top: 10px; font-weight: bold; font-size: 0.9em;"></div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-heading"></i> Asunto del Correo</label>
            <input type="text" name="subject" placeholder="Ej: Reporte Programado de Seguridad" required class="form-control">
        </div>

        <div class="form-group">
            <label><i class="fas fa-align-left"></i> Mensaje del Correo</label>
            <textarea name="body" rows="4" placeholder="Estimados, se adjunta el reporte programado..." required class="form-control"></textarea>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary btn-block" disabled style="opacity: 0.5; cursor: not-allowed;">
            <i class="fas fa-calendar-check"></i> Confirmar Programación
        </button>
    </form>
</section>

<script>
    // Lógica de Validación Profunda ajustada a schedule.html
    const fileInput = document.getElementById('excel_file_schedule');
    const fileLabel = document.querySelector('.file-label span');
    const submitBtn = document.getElementById('submit-btn');
    const feedbackDiv = document.getElementById('validation-feedback');
    const deptSelect = document.getElementById('department-select');
    
    // Funciones de ayuda para el botón
    const disableBtn = () => {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.5';
        submitBtn.style.cursor = 'not-allowed';
    };

    const enableBtn = () => {
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.style.cursor = 'pointer';
    };

    fileInput.addEventListener('change', async (e) => {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            fileLabel.textContent = file.name;
            
            if (!file.name.toLowerCase().endsWith('.xlsx')) {
                 feedbackDiv.innerHTML = '<i class="fas fa-times-circle"></i> Solo se permiten archivos .xlsx';
                 feedbackDiv.style.color = '#dc3545'; // Rojo
                 fileLabel.parentElement.style.borderColor = '#dc3545';
                 disableBtn();
                 return;
            }

            feedbackDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando estructura del Excel...';
            feedbackDiv.style.color = '#0056b3'; // Azul
            fileLabel.parentElement.style.borderColor = '#0056b3';

            const formData = new FormData();
            formData.append('excel_file', file);
            formData.append('department', deptSelect.value);

            try {
                const response = await fetch('/validate-excel', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();

                if (result.is_valid) {
                    feedbackDiv.innerHTML = '<i class="fas fa-check-circle"></i> Archivo válido para ' + deptSelect.options[deptSelect.selectedIndex].text;
                    feedbackDiv.style.color = '#28a745'; // Verde
                    fileLabel.parentElement.style.borderColor = '#28a745';
                    enableBtn();
                } else {
                    feedbackDiv.innerHTML = `<i class="fas fa-times-circle"></i> Error: ${result.message}`;
                    feedbackDiv.style.color = '#dc3545'; // Rojo
                    fileLabel.parentElement.style.borderColor = '#dc3545';
                    disableBtn();
                }
            } catch (error) {
                feedbackDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error al conectar con el servidor.';
                feedbackDiv.style.color = '#dc3545';
                fileLabel.parentElement.style.borderColor = '#dc3545';
                disableBtn();
            }
        } else {
            // Si el usuario cancela la selección
            disableBtn();
            feedbackDiv.textContent = '';
            fileLabel.textContent = 'Arrastra o haz clic para subir';
            fileLabel.parentElement.style.borderColor = '#ccc';
        }
    });

    // Re-validar si el usuario cambia el departamento
    deptSelect.addEventListener('change', () => {
        if (fileInput.files.length > 0) {
            fileInput.dispatchEvent(new Event('change'));
        }
    });
</script>
{% endblock %}
