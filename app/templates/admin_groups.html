{% extends 'base.html' %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_groups.css') }}">
{% endblock %}

{% block content %}
    <h2>Administración de Grupos</h2>
    <p>Selecciona un grupo para editar su nombre o gestionar sus correos.</p>

    <div class="group-selector-container">
        <label>Seleccionar Grupo:</label><br>
        <select id="group-selector">
            <option value="" disabled selected>-- Elige un grupo --</option>
            {% for group in groups %}
                <option value="{{ group.id }}" data-name="{{ group.name }}">{{ group.name }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Panel de Edición (Oculto por defecto) -->
    <div id="admin-panel">
        <div class="admin-panel-section">
            <h3>Editar Nombre del Grupo</h3>
            <form action="{{ url_for('groups.handle_update_name') }}" method="POST">
                <input type="hidden" id="edit-group-id" name="group_id">
                <input type="text" id="edit-group-name" name="new_name" required>
                <button type="submit" class="btn-primary">Guardar Nombre</button>
            </form>
        </div>

        <div class="admin-panel-section">
            <h3>Lista de Emails</h3>
            <div id="email-list-container">
                <!-- Aquí se cargarán los emails con JS -->
                <p class="text-loading">Cargando correos...</p>
            </div>
        </div>
    </div>

    <script>
        const selector = document.getElementById('group-selector');
        const panel = document.getElementById('admin-panel');
        const editId = document.getElementById('edit-group-id');
        const editName = document.getElementById('edit-group-name');
        const emailList = document.getElementById('email-list-container');

        selector.addEventListener('change', function() {
            const groupId = this.value;
            const groupName = this.options[this.selectedIndex].getAttribute('data-name');
            
            panel.style.display = 'block';
            editId.value = groupId;
            editName.value = groupName;

            // Cargar emails vía API
            fetch(`/groups/api/emails/${groupId}`)
                .then(response => response.json())
                .then(data => {
                    emailList.innerHTML = '';
                    if (data.length === 0) {
                        emailList.innerHTML = '<p>No hay emails en este grupo.</p>';
                        return;
                    }
                    data.forEach(item => {
                        const div = document.createElement('div');
                        // Usando la clase definida en el CSS
                        div.className = 'email-list-item'; 
                        
                        div.innerHTML = `
                            <span>${item.email}</span>
                            <a href="/groups/delete_email/${item.id}" 
                               class="btn-danger"
                               onclick="return confirm('¿Borrar este email?')">Borrar</a>
                        `;
                        emailList.appendChild(div);
                    });
                });
        });
    </script>
{% endblock %}
